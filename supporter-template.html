        <img src="/public/img/{%SUPPORTER_IMG_ID%}.png" alt="{%SUPPORTER_NAME%}" title="{%SUPPORTER_NAME%}" class="img-fluid supporter-img">
    </div>
    <div class="col-6 col-md-7 d-flex flex-column justify-content-center">
        <h1 class="rubik-bold">{%SUPPORTER_NAME%}</h1>

</div>
